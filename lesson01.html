<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>はじめてのWebページ</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: lightyellow;
      text-align: center;
      padding: 50px;
    }
    h1 {
      color: red;
    }
    p {
      font-size: 18px;
      color: #333;
    }
    .box {
      background-color: white;
      border: 2px solid #2c7be5;
      border-radius: 10px;
      padding: 20px;
      display: inline-block;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>こんにちは、西です。</h1>
  <p>これは私がはじめて作ったWebページです。</p>

  <div class="box">
    <p>HTMLを勉強中です🎉</p>
    <p>次はCSSでデザインを学びます！</p>
  </div>
　<button onclick="alert('おはようございます！')">クリックしてね！
</button>
　<img src="gazou.jpg" width="300">
 <br><br>
<input type="text" id="namae" placeholder="名前を入力してください">
<button onclick="aisatsu()">送信</button>

<p id="message"></p>

<br><br>
<div class="box">
  <p>🕐 現在時刻</p>
  <p id="clock" style="font-size: 24px; font-weight: bold;"></p>
</div>

<br>
<div class="box">
  <p>🌤️ 天気を調べる</p>
  <input type="text" id="city" placeholder="都市名を入力（例：Tokyo）">
  <br><br>
  <button onclick="getTenki()">天気を見る</button>
  <p id="tenki"></p>
</div>

<script>
  function aisatsu() {
    var namae = document.getElementById('namae').value;
    document.getElementById('message').textContent = namae + 'さん、こんにちは！';
  }

  // 時計
  function updateClock() {
    var now = new Date();
    var hours = String(now.getHours()).padStart(2, '0');
    var minutes = String(now.getMinutes()).padStart(2, '0');
    var seconds = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = hours + ':' + minutes + ':' + seconds;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // 天気
  function getTenki() {
    var city = document.getElementById('city').value;
    var apiKey = 'YOUR_API_KEY';
    var url = 'https://api.openweathermap.org/data/2.5/weather?q=' + city + '&appid=' + apiKey + '&units=metric&lang=ja';

    fetch(url)
      .then(function(response) { return response.json(); })
      .then(function(data) {
        if (data.cod === 200) {
          document.getElementById('tenki').textContent =
            city + 'の天気：' + data.weather[0].description + '、気温：' + data.main.temp + '℃';
        } else {
          document.getElementById('tenki').textContent = '都市が見つかりませんでした。';
        }
      })
      .catch(function() {
        document.getElementById('tenki').textContent = 'エラーが発生しました。';
      });
  }
</script>

</body>
</html>
